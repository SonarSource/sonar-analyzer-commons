name: Build

on:
  schedule:
    # Run every day at 6:00
    - cron: "0 6 * * *"
  push:
    branches:
      - master
      - branch-*
      - dogfood-on-*
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  build:
    runs-on: sonar-xs
    name: Build
    permissions:
      id-token: write  # Required for Vault OIDC authentication
      contents: write  # Required for repository access and tagging
    outputs:
      # Consumed by the promote-nuget job to promote the matching NuGet build-info.
      build-number: ${{ steps.build-maven.outputs.BUILD_NUMBER }}
      deployed: ${{ steps.build-maven.outputs.deployed }}
    steps:
      - &checkout
        name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup development environment with mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.7
      - name: Build and analyze with Maven
        id: build-maven
        uses: SonarSource/ci-github-actions/build-maven@v1
        with:
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          deploy-pull-request: true

      # --- NuGet package: DigiCert-sign and publish to the Repox NuGet feed. ---
      # The Maven build only assembles the .nupkg into target/; it is NOT a Maven artifact. These steps sign it
      # and upload it to a NuGet-layout repo so .NET projects can consume it. Only runs when Maven actually deployed.
      - name: Prepare NuGet package
        id: nupkg
        if: steps.build-maven.outputs.deployed == 'true'
        shell: bash
        env:
          PROJECT_VERSION: ${{ steps.build-maven.outputs.project-version }}
        run: |
          set -euo pipefail
          MODULE=sonar-analyzer-commons-configurations
          # package.version is project.version with -SNAPSHOT stripped (in CI there is no -SNAPSHOT suffix).
          PKG_VERSION="${PROJECT_VERSION%-SNAPSHOT}"
          # Must equal the nuspec <id>; the feed derives the package identity from the "<id>.<version>.nupkg" name.
          PKG_ID=SonarAnalyzer.CommonsConfigurations
          SRC="${MODULE}/target/${MODULE}-${PROJECT_VERSION}-nupkg.zip"
          OUT_DIR=nuget-staging
          if [[ ! -f "$SRC" ]]; then
            echo "::error::Expected NuGet package not found at $SRC"
            ls -la "${MODULE}/target" || true
            exit 1
          fi
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          cp "$SRC" "${OUT_DIR}/${PKG_ID}.${PKG_VERSION}.nupkg"
          {
            echo "dir=${OUT_DIR}"
            echo "id=${PKG_ID}"
            echo "version=${PKG_VERSION}"
          } >> "$GITHUB_OUTPUT"

      # DigiCert (not Azure Trusted Signing): nuget.org requires a registered certificate
      # thumbprint. Azure Artifact Signing certs rotate ~72h, so they cannot be registered.
      # See Platform docs "Windows Artifact Signing - GitHub" and PREQ-7434 / NuGetGallery#10027.
      # Sign only release branches (not PRs): DigiCert quota is limited; matches .NET / ADO practice.
      - name: Setup DigiCert Client Tools
        if: ${{ steps.build-maven.outputs.deployed == 'true' && github.event_name != 'pull_request' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref_name, 'branch-')) }}
        uses: SonarSource/ci-github-actions/code-signing@v1
      - name: Sign NuGet package with DigiCert
        if: ${{ steps.build-maven.outputs.deployed == 'true' && github.event_name != 'pull_request' && (github.ref_name == github.event.repository.default_branch || startsWith(github.ref_name, 'branch-')) }}
        shell: bash
        env:
          NUPKG_DIR: ${{ steps.nupkg.outputs.dir }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=("${NUPKG_DIR}"/*.nupkg)
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            echo "::error::No .nupkg found under ${NUPKG_DIR}"
            exit 1
          fi
          # Prefer smctl + jsign (ci-github-actions docs). jsign DIGICERTONE REST against
          # this host failed in CI with a non-JSON keypair response after resolving cert_*.
          PKCS11_CFG="${SMTOOLS_PATH}/pkcs11properties.cfg"
          if [[ ! -f "${PKCS11_CFG}" ]]; then
            echo "::error::Missing DigiCert PKCS#11 config at ${PKCS11_CFG}"
            ls -la "${SMTOOLS_PATH}" || true
            exit 1
          fi
          KEYPAIR_ALIAS="$(smctl keypair ls 2>/dev/null | awk 'NR > 1 && toupper($0) ~ /ACTIVE/ { print $2; exit }')"
          if [[ -z "${KEYPAIR_ALIAS}" ]]; then
            # Legacy SonarSource DigiCert keypair used by other public NuGet / Windows signers.
            KEYPAIR_ALIAS=key_525594307
            echo "smctl keypair ls did not yield an ACTIVE alias; falling back to ${KEYPAIR_ALIAS}"
          fi
          echo "Using DigiCert keypair alias: ${KEYPAIR_ALIAS}"
          for pkg in "${pkgs[@]}"; do
            smctl sign \
              --keypair-alias="${KEYPAIR_ALIAS}" \
              --config-file "${PKCS11_CFG}" \
              --input "${pkg}" \
              --tool jsign
            if ! jsign extract "${pkg}" > /dev/null 2>&1; then
              echo "::error::No signature found on ${pkg}"
              exit 1
            fi
            rm -f "${pkg}.sig"
            echo "Signature verified on ${pkg}"
          done

      - name: Install jfrog-cli
        if: steps.build-maven.outputs.deployed == 'true'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            jfrog-cli 2.103

      - name: Get QA deployer token
        id: deployer-secrets
        if: steps.build-maven.outputs.deployed == 'true'
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-qa-deployer access_token | ARTIFACTORY_ACCESS_TOKEN;

      - name: Deploy signed NuGet package to Repox
        if: steps.build-maven.outputs.deployed == 'true'
        shell: bash
        env:
          ARTIFACTORY_ACCESS_TOKEN: ${{ steps.deployer-secrets.outputs.vault && fromJSON(steps.deployer-secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN || '' }}
          BUILD_NUMBER: ${{ steps.build-maven.outputs.BUILD_NUMBER }}
          NUPKG_DIR: ${{ steps.nupkg.outputs.dir }}
          NUPKG_ID: ${{ steps.nupkg.outputs.id }}
          NUPKG_VERSION: ${{ steps.nupkg.outputs.version }}
        run: |
          set -euo pipefail
          # Separate build-info name so it does not collide with the Maven build-info (github.repository name).
          BUILD_NAME="${GITHUB_REPOSITORY#*/}_nuget"
          MODULE_GAV="org.sonarsource.analyzer-commons:${NUPKG_ID}:${NUPKG_VERSION}"
          jf config add repox \
            --artifactory-url="https://repox.jfrog.io/artifactory" \
            --access-token="$ARTIFACTORY_ACCESS_TOKEN" \
            --interactive=false
          jf config use repox
          jf rt upload --flat \
            --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER" --module="$MODULE_GAV" \
            "${NUPKG_DIR}/*.nupkg" "sonarsource-nuget-qa/"
          jf rt build-collect-env "$BUILD_NAME" "$BUILD_NUMBER"
          jf rt build-publish "$BUILD_NAME" "$BUILD_NUMBER"

      - name: Deploy npm package to Repox
        if: steps.build-maven.outputs.deployed == 'true'
        shell: bash
        env:
          BUILD_NUMBER: ${{ steps.build-maven.outputs.BUILD_NUMBER }}
          PROJECT_VERSION: ${{ steps.build-maven.outputs.project-version }}
        run: |
          set -euo pipefail
          MODULE=sonar-analyzer-commons-configurations
          DEPLOY_REPO=sonarsource-npm-public-qa
          PKG_NAME=analyzer-commons-configurations
          # The assembly names the tarball with the 4-part Maven version, e.g. 2.28.0.1234.
          SRC="${MODULE}/target/${MODULE}-${PROJECT_VERSION}-npm.tar.gz"
          # npm needs semver: rewrite the trailing .BUILD to a -BUILD prerelease (2.28.0.1234 -> 2.28.0-1234).
          # Must match the version baked into the tarball's package.json (${npm.package.version} in the module).
          NPM_VERSION="$(printf '%s' "$PROJECT_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$/\1-\2/')"
          if [[ ! -f "$SRC" ]]; then
            echo "::error::Expected npm package not found at $SRC"
            ls -la "${MODULE}/target" || true
            exit 1
          fi
          # Separate build-info name so it does not collide with the Maven (github.repository) or _nuget build-info.
          BUILD_NAME="${GITHUB_REPOSITORY#*/}_npm"
          MODULE_GAV="org.sonarsource.analyzer-commons:@sonarsource/${PKG_NAME}:${NPM_VERSION}"
          # Canonical scoped-npm layout path so Artifactory indexes it and the metadata's tarball URL is correct.
          TARGET="${DEPLOY_REPO}/@sonarsource/${PKG_NAME}/-/${PKG_NAME}-${NPM_VERSION}.tgz"
          jf config use repox
          jf rt upload --flat \
            --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER" --module="$MODULE_GAV" \
            "$SRC" "$TARGET"
          # The promote-npm job (ci-github-actions/promote@v1) reads these from the build-info to derive the
          # target repo (…-qa -> …-builds) and the promoted version, so export them before build-collect-env
          # captures the environment into buildInfo.env.
          export ARTIFACTORY_DEPLOY_REPO="$DEPLOY_REPO"
          export PROJECT_VERSION="$NPM_VERSION"
          jf rt build-collect-env "$BUILD_NAME" "$BUILD_NUMBER"
          jf rt build-publish "$BUILD_NAME" "$BUILD_NUMBER"

  promote:
    needs: [ build ]
    runs-on: sonar-xs
    name: Promote
    permissions:
      id-token: write
      contents: write
    steps:
      - *checkout
      - name: Promote artifacts
        uses: SonarSource/ci-github-actions/promote@v1
        with:
          promote-pull-request: true

  promote-nuget:
    needs: [ build ]
    if: needs.build.outputs.deployed == 'true'
    runs-on: sonar-xs
    name: Promote NuGet
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install jfrog-cli
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            jfrog-cli 2.103
      - name: Get promoter token
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-promoter access_token | PROMOTER_ACCESS_TOKEN;
      - name: Promote NuGet build
        shell: bash
        env:
          PROMOTER_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).PROMOTER_ACCESS_TOKEN }}
          BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
        run: |
          set -euo pipefail
          BUILD_NAME="${GITHUB_REPOSITORY#*/}_nuget"
          # Pull requests are promoted to the dev feed; master/branch-* builds to the public feed.
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            TARGET_REPO=sonarsource-nuget-dev
            STATUS=it-passed-pr
          else
            TARGET_REPO=sonarsource-nuget-public
            STATUS=it-passed
          fi
          jf config add repox \
            --artifactory-url="https://repox.jfrog.io/artifactory" \
            --access-token="$PROMOTER_ACCESS_TOKEN" \
            --interactive=false
          jf config use repox
          jf rt build-promote "$BUILD_NAME" "$BUILD_NUMBER" "$TARGET_REPO" \
            --status="$STATUS" \
            --source-repo="sonarsource-nuget-qa"
          # build-promote returns success even when it moves 0 artifacts (e.g. a source-repo
          # mismatch), which silently leaves nothing in the target feed. Assert the build's
          # package actually landed so a no-op promotion fails the job instead of looking green.
          FOUND=$(jf rt search --build="$BUILD_NAME/$BUILD_NUMBER" --count "$TARGET_REPO/*.nupkg")
          if [[ "${FOUND:-0}" -lt 1 ]]; then
            echo "::error::NuGet promotion reported success but no .nupkg from ${BUILD_NAME}/${BUILD_NUMBER} is present in ${TARGET_REPO}"
            exit 1
          fi
          echo "Verified ${FOUND} NuGet package(s) from ${BUILD_NAME}/${BUILD_NUMBER} in ${TARGET_REPO}"

  promote-npm:
    needs: [ build ]
    if: needs.build.outputs.deployed == 'true'
    runs-on: sonar-xs
    name: Promote npm
    permissions:
      id-token: write
      contents: write
    steps:
      - *checkout
      - name: Promote npm build
        uses: SonarSource/ci-github-actions/promote@v1
        with:
          build-name: ${{ github.event.repository.name }}_npm
          promote-pull-request: true
