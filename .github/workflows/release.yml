---
name: sonar-release
# This workflow is triggered when publishing a new github release
# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Version
        required: true
      releaseId:
        type: string
        description: GitHub release ID (required for a full release; unused when publishPackagesOnly=true)
        required: false
      dryRun:
        type: boolean
        description: Flag to enable the dry-run execution
        default: false
      publishPackagesOnly:
        type: boolean
        description: Skip Maven/binaries release; only promote and publish npm/NuGet to public registries
        default: false

jobs:
  release:
    if: ${{ github.event_name == 'release' || inputs.publishPackagesOnly != true }}
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@v6
    with:
      publishToBinaries: true
      mavenCentralSync: true
      slackChannel: squad-corelang-release
      version: ${{ inputs.version || github.event.release.tag_name }}
      releaseId: ${{ inputs.releaseId || github.event.release.id }}
      dryRun: ${{ inputs.dryRun == true }}

  # Promote the signed NuGet package from the public build feed to the release feed. The Maven
  # release above does not handle it (the .nupkg is published to the NuGet feed, not as a Maven artifact).
  promote-nuget:
    needs: [release]
    # Run after a successful release, or when release was skipped via publishPackagesOnly.
    if: ${{ !cancelled() && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    runs-on: sonar-xs-public
    name: Promote NuGet to releases
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install jfrog-cli
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            jfrog-cli 2.103
      - name: Get promoter token
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-promoter access_token | PROMOTER_ACCESS_TOKEN;
      - name: Promote NuGet package to releases
        shell: bash
        env:
          PROMOTER_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).PROMOTER_ACCESS_TOKEN }}
          # The release tag is the full 4-part version, e.g. 2.27.0.5000; the build number is its last segment.
          RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          BUILD_NAME="${GITHUB_REPOSITORY#*/}_nuget"
          BUILD_NUMBER="${RELEASE_VERSION##*.}"
          jf config add repox \
            --artifactory-url="https://repox.jfrog.io/artifactory" \
            --access-token="$PROMOTER_ACCESS_TOKEN" \
            --interactive=false
          jf config use repox
          jf rt build-promote "$BUILD_NAME" "$BUILD_NUMBER" "sonarsource-nuget-releases" \
            --status="Released" \
            --source-repo="sonarsource-nuget-public" \
            --copy=true

  # Promote the npm package from the public build feed to the release feed. As with NuGet, the Maven
  # release above does not handle it (the .tgz is published to the npm feed, not as a Maven artifact).
  promote-npm:
    needs: [release]
    # Run after a successful release, or when release was skipped via publishPackagesOnly.
    if: ${{ !cancelled() && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    runs-on: sonar-xs-public
    name: Promote npm to releases
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install jfrog-cli
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            jfrog-cli 2.103
      - name: Get promoter token
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-promoter access_token | PROMOTER_ACCESS_TOKEN;
      - name: Promote npm package to releases
        shell: bash
        env:
          PROMOTER_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).PROMOTER_ACCESS_TOKEN }}
          # The release tag is the full 4-part version, e.g. 2.27.0.5000; the build number is its last segment.
          RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          BUILD_NAME="${GITHUB_REPOSITORY#*/}_npm"
          BUILD_NUMBER="${RELEASE_VERSION##*.}"
          jf config add repox \
            --artifactory-url="https://repox.jfrog.io/artifactory" \
            --access-token="$PROMOTER_ACCESS_TOKEN" \
            --interactive=false
          jf config use repox
          jf rt build-promote "$BUILD_NAME" "$BUILD_NUMBER" "sonarsource-npm-public-releases" \
            --status="Released" \
            --source-repo="sonarsource-npm-public-builds" \
            --copy=true

  # sonar-dotnet and SonarJS are public repos with no RepoX access, so the NuGet/npm packages
  # they depend on must also exist on the actual public registries, not just in RepoX.
  publish-nuget-public:
    needs: [ promote-nuget ]
    # Explicit condition required: when `release` is skipped (publishPackagesOnly), GitHub skips
    # downstream jobs that lack an if, even if promote-nuget succeeded.
    if: ${{ !cancelled() && needs.promote-nuget.result == 'success' }}
    runs-on: sonar-xs-public
    name: Publish NuGet to nuget.org
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install jfrog-cli
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            jfrog-cli 2.103
            dotnet 10
      - name: Get secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-promoter access_token | PROMOTER_ACCESS_TOKEN;
            development/team/languages/kv/data/nuget apikey | NUGET_API_KEY;
      - name: Download released NuGet package from Repox
        shell: bash
        env:
          PROMOTER_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).PROMOTER_ACCESS_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          BUILD_NAME="${GITHUB_REPOSITORY#*/}_nuget"
          BUILD_NUMBER="${RELEASE_VERSION##*.}"
          jf config add repox \
            --artifactory-url="https://repox.jfrog.io/artifactory" \
            --access-token="$PROMOTER_ACCESS_TOKEN" \
            --interactive=false
          jf config use repox
          rm -rf nuget-release && mkdir nuget-release
          jf rt download --build="${BUILD_NAME}/${BUILD_NUMBER}" --flat "sonarsource-nuget-releases/*.nupkg" nuget-release/
      - name: Push NuGet package to nuget.org
        if: ${{ inputs.dryRun != true }}
        shell: bash
        env:
          NUGET_API_KEY: ${{ fromJSON(steps.secrets.outputs.vault).NUGET_API_KEY }}
        run: |
          set -euo pipefail
          dotnet nuget push "nuget-release/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  publish-npm-public:
    needs: [ promote-npm ]
    # Explicit condition required: when `release` is skipped (publishPackagesOnly), GitHub skips
    # downstream jobs that lack an if, even if promote-npm succeeded.
    if: ${{ !cancelled() && needs.promote-npm.result == 'success' }}
    runs-on: github-ubuntu-latest-s # npm Trusted Publishing requires a GitHub-hosted runner
    name: Publish npm to npmjs.org
    environment: release
    permissions:
      id-token: write # consumed by npm's OIDC trusted publisher check
      contents: read
    steps:
      - name: Install jfrog-cli
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            jfrog-cli 2.103
      - name: Get secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-promoter access_token | PROMOTER_ACCESS_TOKEN;
      - name: Download released npm package from Repox
        shell: bash
        env:
          PROMOTER_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).PROMOTER_ACCESS_TOKEN }}
          # The release tag is the full 4-part version, e.g. 2.27.0.5000; the build number is its last segment.
          RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          BUILD_NAME="${GITHUB_REPOSITORY#*/}_npm"
          BUILD_NUMBER="${RELEASE_VERSION##*.}"
          jf config add repox \
            --artifactory-url="https://repox.jfrog.io/artifactory" \
            --access-token="$PROMOTER_ACCESS_TOKEN" \
            --interactive=false
          jf config use repox
          rm -rf npm-release && mkdir npm-release
          jf rt download --build="${BUILD_NAME}/${BUILD_NUMBER}" --flat "sonarsource-npm-public-releases/*.tgz" npm-release/
      - name: Publish npm package to npmjs.org
        if: ${{ inputs.dryRun != true }}
        shell: bash
        run: |
          set -euo pipefail
          # npm Trusted Publishing requires npm >= 11.5.1; GitHub-hosted runners may ship an older bundled npm.
          npm install -g npm@latest
          # Use ./ prefix: without it, npm treats "npm-release/foo.tgz" as a github: shorthand (EALLOWGIT).
          shopt -s nullglob
          pkgs=(./npm-release/*.tgz)
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            echo "::error::No .tgz found under ./npm-release"
            exit 1
          fi
          for pkg in "${pkgs[@]}"; do
            echo "Publishing ${pkg}"
            # Build-style versions (e.g. 2.29.0-5104) are semver prereleases; npm requires --tag.
            npm publish "${pkg}" --access public --provenance --tag latest
          done
